<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a2a1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: 'Fira Code', 'Consolas', monospace; }
      .dim  { fill: #7d8590; }
      .grn  { fill: #00ff88; }
      .grnA { fill: #00ffaa; }
      .line { stroke: #1b2430; stroke-width: 1; }
      .dot  { fill: #1f6f4a; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>

  <!-- world-map style dot grid (abstract, top-right) -->
  <g opacity="0.55">
    <g class="dot">
      <circle cx="860" cy="40" r="2"/><circle cx="885" cy="55" r="2"/><circle cx="910" cy="38" r="2"/>
      <circle cx="935" cy="60" r="2"/><circle cx="960" cy="42" r="2"/><circle cx="985" cy="58" r="2"/>
      <circle cx="1010" cy="44" r="2"/><circle cx="1035" cy="62" r="2"/><circle cx="1060" cy="40" r="2"/>
      <circle cx="1085" cy="56" r="2"/><circle cx="1110" cy="46" r="2"/><circle cx="1135" cy="60" r="2"/>
      <circle cx="900" cy="75" r="2"/><circle cx="950" cy="80" r="2"/><circle cx="1000" cy="76" r="2"/>
      <circle cx="1050" cy="82" r="2"/><circle cx="1100" cy="78" r="2"/>
    </g>
  </g>

  <!-- terminal window -->
  <g transform="translate(40,40)">
    <rect width="500" height="200" rx="10" fill="#0a0f14" stroke="#1f6f4a" stroke-width="1.5"/>
    <!-- title bar -->
    <rect width="500" height="28" rx="10" fill="#10151c"/>
    <circle cx="18" cy="14" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="14" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="14" r="5" fill="#27c93f"/>
    <text x="250" y="18" text-anchor="middle" class="mono dim" font-size="11">soc@phantomguard:~</text>

    <text x="16" y="55" class="mono grn" font-size="13">root@security:~$ <tspan class="dim">whoami</tspan></text>
    <text x="16" y="78" class="mono grnA" font-size="13">&gt; Abdalmeged Alfiky</text>
    <text x="16" y="100" class="mono dim" font-size="12">&gt; SOC Analyst / Product Owner</text>
    <text x="16" y="120" class="mono dim" font-size="12">&gt; Threat Intel..... [LOADED]</text>
    <text x="16" y="140" class="mono dim" font-size="12">&gt; ELK Stack........ [CONNECTED]</text>
    <text x="16" y="160" class="mono dim" font-size="12">&gt; MITRE ATT&amp;CK..... [MAPPED]</text>
    <text x="16" y="182" class="mono grn" font-size="12">Status: <tspan class="grnA">██████████████ 100%</tspan></text>
  </g>

  <!-- name & roles -->
  <g transform="translate(580,70)">
    <text x="0" y="0" class="mono grnA" font-size="36" font-weight="700">ABDALMEGED ALFIKY</text>
    <text x="0" y="38" class="mono dim" font-size="16">Cybersecurity Engineer · SOC Analyst · Product Owner</text>

    <!-- tag chips -->
    <g class="mono" font-size="12">
      <rect x="0" y="60" width="118" height="26" rx="13" fill="none" stroke="#00ff88"/>
      <text x="59" y="77" text-anchor="middle" class="grn">AI Security</text>

      <rect x="130" y="60" width="110" height="26" rx="13" fill="none" stroke="#00ff88"/>
      <text x="185" y="77" text-anchor="middle" class="grn">ELK Stack</text>

      <rect x="252" y="60" width="140" height="26" rx="13" fill="none" stroke="#00ff88"/>
      <text x="322" y="77" text-anchor="middle" class="grn">MITRE ATT&amp;CK</text>

      <rect x="404" y="60" width="150" height="26" rx="13" fill="none" stroke="#00ff88"/>
      <text x="479" y="77" text-anchor="middle" class="grn">SOC Automation</text>
    </g>

    <!-- mini SOC dashboard sparkline -->
    <g transform="translate(0,110)">
      <line x1="0" y1="50" x2="560" y2="50" class="line"/>
      <polyline points="0,40 40,30 80,42 120,18 160,35 200,12 240,28 280,8 320,30 360,15 400,33 440,10 480,25 520,5 560,20"
                fill="none" stroke="#00ff88" stroke-width="2" opacity="0.85"/>
      <text x="0" y="68" class="mono dim" font-size="11">threat_activity.log — last 24h</text>
    </g>
  </g>
</svg>
