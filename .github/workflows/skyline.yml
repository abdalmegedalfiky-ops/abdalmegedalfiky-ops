name: Generate 3D Contribution Image

# ملاحظة لمجد:
# GitHub نفسها بدّلت أداة "Skyline" الرسمية لتكون CLI extension
# بتعمل ملف STL للطباعة 3D، ومش مناسبة للعرض داخل README مباشرة.
# الأداة دي (github-profile-3d-contrib) هي البديل المجتمعي الأكثر استخدامًا
# لعرض صورة ثلاثية الأبعاد لنشاطك داخل البروفايل.

on:
  schedule:
    - cron: "0 0 * * *"   # يوميًا
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D contribution image
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & push generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "docs: update 3D contribution image"
          git push
